name: CI # Nome do Workflow

on: # Especifica quando 
  pull_request:
    brances:
      - main

jobs:
  test:
    runs-on: ubuntu-latest # VM que o GitHUb irá criar para rodar o job
    steps:
      - name: Checkout do código # Copiando código do repositorio
        uses: actions/checkout@v4 # Action oficial do git hub

      - name: Instalando Docker Buildx # Action de cachear imagens locais do docker
        uses: docker/setup-buildx-action@v3

      - name: Build docker com cache # Buildando containers
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: larachat:latest
          push: false
          cache-from: type=gha,scope=larachat
          cache-to: type=gha,mode=max

      - name: Levantando containers 
        run: docker compose up -d
      
      - name: Composer Install
        run: docker exec larachat composer install
      
      - name: Rodando teste
        run: docker exec larachat php artisan test tests/Unit/ExampleTest.php
        